manifestVersion: 1
id: gofractal
category: bitcoin
name: GoFractal
version: "0.2.3"
tagline: Fractal node + solo pool
description: >-
  Run a Fractal Bitcoin full node and an integrated solo Stratum v1 pool (ckpool) as a single app.


  Features:
    - Go-style dashboard for node sync and pool stats
    - Difficulty presets (vardiff) tuned for home miners
    - Blocks view for solved blocks, plus optional history scan
    - Community support


  Miner connection:
    - Set your payout address in the app Settings tab.
    - URL: `stratum+tcp://<your-host-ip>:4568`
    - Username: worker name (optional). `walletAddress.workername` also works, but it does not control payout.
      Example: `rig01.workername`
    - Password: anything


  Notes:
    - Ensure payout address format matches Fractal requirements.
    - Solo mining is extremely unlikely to find blocks without significant hashrate.
    - First sync can be slow. SSD strongly recommended.


  Components:
    - Fractal Bitcoin full node
    - ckpool (GPLv3) solo pool engine: https://github.com/ctubio/ckpool


  Status:
    - DEVELOPMENT build: verify payout addresses before mining.
developer: GoStrataCore
website: https://github.com/Ellevix/Mining-community-store
repo: https://github.com/Ellevix/Mining-community-store
support: https://github.com/Ellevix/Mining-community-store
dependencies: []
port: 32122
icon: ""
gallery: []
path: ""
defaultUsername: ""
defaultPassword: ""
widgets:
  - id: "sync"
    type: "text-with-progress"
    refresh: "5s"
    endpoint: "gofractal-app:3000/api/widget/sync"
    link: ""
    example:
      type: "text-with-progress"
      link: ""
      title: "Fractal sync"
      text: "83%"
      progressLabel: "In progress"
      progress: 0.83
  - id: "pool"
    type: "three-stats"
    refresh: "30s"
    endpoint: "gofractal-app:3000/api/widget/pool"
    link: ""
    example:
      type: "three-stats"
      link: ""
      items:
        - title: "Hashrate"
          text: "1.2"
          subtext: "TH/s"
        - title: "Workers"
          text: "2"
        - title: "Best Share"
          text: "21"
          subtext: "G"
backupIgnore:
  - data/node/blocks
  - data/node/chainstate
  - data/node/indexes
submitter: Ellevix
